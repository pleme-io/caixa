{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "caixa.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "caixa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "caixa.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  ingress:
    - from:
        - podSelector: {}
  egress:
    # kube-apiserver.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # DNS.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Outbound git (port 22 + 443); tighten via values.
    - to:
        {{- range .Values.networkPolicy.allowedEgressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 22
        - protocol: TCP
          port: 443
{{- end }}
