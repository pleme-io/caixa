apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: caixa
  namespace: flux-system
spec:
  interval: 10m
  path: ./operator-flux
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # caixa-operator depends on CRDs; tell Flux to apply those first.
  healthChecks:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: caixas.caixa.pleme.io
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: lacres.caixa.pleme.io
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: caixabuilds.caixa.pleme.io
    - apiVersion: apps/v1
      kind: Deployment
      name: caixa
      namespace: caixa-system
  timeout: 5m
